<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Comment Blocker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 260px;
      padding: 12px;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    .row {
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 8px;
      cursor: pointer;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .muted {
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Comment Blocker</h1>

  <div class="row">
    <label>
      <input type="checkbox" id="enabled">
      Enable blocking
    </label>
  </div>

  <div class="row">
    <button id="toggleSite">Toggle current site whitelist</button>
  </div>

  <div class="row muted" id="siteStatus">Checking site…</div>

  <script src="popup.js"></script>
</body>
</html>
